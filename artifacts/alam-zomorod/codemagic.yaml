workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: App Store Connect API Key  # configure in Codemagic UI

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.emeraldworld.workspace
      vars:
        BUNDLE_ID: "com.emeraldworld.workspace"
        XCODE_SCHEME: "aalmzmrdh"
        XCODE_WORKSPACE: "ios/aalmzmrdh.xcworkspace"
        XCODE_CONFIG: "Release"
        ARCHIVE_PATH: "$CM_BUILD_DIR/aalmzmrdh.xcarchive"
        EXPORT_PATH: "$CM_BUILD_DIR/ios_output"
      node: 20.18.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci --legacy-peer-deps

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch Apple signing certificates & profiles
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply code signing to Xcode project
        script: xcode-project use-profiles

      - name: Build iOS archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIG" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            clean archive | xcpretty

      - name: Export IPA
        script: |
          TEAM_ID=$(xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -showBuildSettings 2>/dev/null \
            | grep " DEVELOPMENT_TEAM" | head -1 | awk '{print $NF}')

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$EXPORT_PATH" | xcpretty

    artifacts:
      - $CM_BUILD_DIR/ios_output/*.ipa
      - $CM_BUILD_DIR/ios_output/*.dSYM.zip
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  ios-internal:
    name: iOS Internal (Ad-Hoc)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.emeraldworld.workspace
      vars:
        BUNDLE_ID: "com.emeraldworld.workspace"
        XCODE_SCHEME: "aalmzmrdh"
        XCODE_WORKSPACE: "ios/aalmzmrdh.xcworkspace"
        XCODE_CONFIG: "Release"
        ARCHIVE_PATH: "$CM_BUILD_DIR/aalmzmrdh-adhoc.xcarchive"
        EXPORT_PATH: "$CM_BUILD_DIR/ios_adhoc"
      node: 20.18.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch Ad-Hoc signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply code signing
        script: xcode-project use-profiles

      - name: Build iOS archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIG" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            clean archive | xcpretty

      - name: Export IPA
        script: |
          TEAM_ID=$(xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -showBuildSettings 2>/dev/null \
            | grep " DEVELOPMENT_TEAM" | head -1 | awk '{print $NF}')

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$EXPORT_PATH" | xcpretty

    artifacts:
      - $CM_BUILD_DIR/ios_adhoc/*.ipa
