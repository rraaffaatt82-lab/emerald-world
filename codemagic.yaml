workflows:
  ios-build:
    name: iOS Build (Expo EAS)

    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo + EAS
        script: |
          npm install -g expo-cli eas-cli

      - name: Login to Expo (anonymous)
        script: |
          npx expo login --non-interactive || true

      - name: Build iOS with EAS
        script: |
          npx eas build --platform ios --non-interactive

    artifacts:
      - "*.ipa"