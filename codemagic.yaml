workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Build iOS
        script: |
          npx expo prebuild --platform ios
          npx expo run:ios --no-install

    artifacts:
      - ios/build/**/*.ipa