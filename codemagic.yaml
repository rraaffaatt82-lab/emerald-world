workflows:
  ios-workflow:
    name: iOS Build (IPA)

    max_build_duration: 60

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS Release (IPA)
        script: |
          cd ios
          xcodebuild \
          -workspace *.xcworkspace \
          -scheme workspace \
          -configuration Release \
          -archivePath build/App.xcarchive archive

    artifacts:
      - ios/build/**/*.ipa
      - ios/build/**/*.xcarchive