workflows:
  ios-workflow:
    name: iOS Build

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo prebuild (inside Codemagic)
        script: |
          npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          cd ios
          xcodebuild \
          -workspace *.xcworkspace \
          -scheme workspace \
          -configuration Release \
          -archivePath build/App.xcarchive archive

    artifacts:
      - ios/build/**/*.ipa